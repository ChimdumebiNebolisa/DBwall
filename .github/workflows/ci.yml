name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        run: go build -v ./cmd/dbguard
        env:
          CGO_ENABLED: 1

      - name: Test
        run: go test -v -count=1 ./...
        env:
          CGO_ENABLED: 1
        timeout-minutes: 10
