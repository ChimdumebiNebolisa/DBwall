name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X github.com/ChimdumebiNebolisa/DBwall/internal/version.Version=${VERSION}"
          mkdir -p dist
          builds=(
            "linux amd64 tar.gz"
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
          )
          for build in "${builds[@]}"; do
            read -r GOOS GOARCH ARCHIVE <<<"${build}"
            BIN="dbguard"
            if [[ "${GOOS}" == "windows" ]]; then
              BIN="dbguard.exe"
            fi
            OUTDIR="dist/dbguard_${VERSION}_${GOOS}_${GOARCH}"
            mkdir -p "${OUTDIR}"
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -ldflags "${LDFLAGS}" -o "${OUTDIR}/${BIN}" ./cmd/dbguard
            cp README.md LICENSE "${OUTDIR}/"
            if [[ "${ARCHIVE}" == "zip" ]]; then
              (cd "${OUTDIR}" && zip -rq "../dbguard_${VERSION}_${GOOS}_${GOARCH}.zip" .)
            else
              tar -C "${OUTDIR}" -czf "dist/dbguard_${VERSION}_${GOOS}_${GOARCH}.tar.gz" .
            fi
            rm -rf "${OUTDIR}"
          done
          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
